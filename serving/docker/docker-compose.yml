version: "3.8"
services:
  gemma4npc:
    build:
      context: ../..
      dockerfile: serving/docker/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ../../outputs:/app/outputs
      - ../../models:/app/models
      - ../../configs:/app/configs
    environment:
      - MODEL_PATH=/app/models/Gemma4NPC-it-Q4_K_M.gguf
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
