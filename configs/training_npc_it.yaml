# Gemma4NPC-it Training Config — PIPPA + NPC_dialogue_v2 (flagship NPC model)
# SPDX-License-Identifier: Apache-2.0

model:
  base_model: "google/gemma-4-12B-it"
  load_in_4bit: true
  dtype: "bfloat16"

lora:
  r: 16
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

data:
  train_file: "data/augmented/npc_quest_sft_fixed.jsonl"
  val_file: "data/augmented/npc_quest_sft_fixed.jsonl"
  max_seq_length: 4096
  packing: false

training:
  output_dir: "outputs/Gemma4NPC-it"
  num_train_epochs: 1
  max_steps: 250
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  warmup_steps: 50
  max_grad_norm: 0.4
  weight_decay: 0.01
  optim: "adamw_8bit"
  logging_steps: 10
  save_steps: 50
  eval_steps: 250
  fp16: false
  bf16: true
  seed: 42
  dataloader_num_workers: 4
  report_to: "wandb"
  save_total_limit: 3
  run_name: "Gemma4NPC-it-run1"

generation:
  temperature: 1.0
  top_p: 0.95
  top_k: 64
  max_new_tokens: 256
